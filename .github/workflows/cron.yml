name: Scheduled jobs (expire + reminders)

# 15분마다 만료 처리 + 리마인더 엔드포인트를 호출합니다.
# (GitHub Actions의 무료 cron은 부하 상황에 따라 수 분 지연될 수 있습니다 — 예약 만료/리마인더 용도엔 충분)
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Expire pending appointments
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.APP_BASE_URL }}/api/cron/expire-appointments" \
            -w "\nexpire: %{http_code}\n"

      - name: Send reminders
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ vars.APP_BASE_URL }}/api/cron/reminders" \
            -w "\nreminders: %{http_code}\n"
